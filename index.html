<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Driving Car Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="left-panel">
            <h1>Controls & Info</h1>
            
            <div id="mode-selector">
                <button id="drivingBtn" class="mode-btn">Driving Mode</button>
                <button id="editingBtn" class="mode-btn active">Editing Mode</button>
            </div>
            <hr>
            
            <p>
                <b>Player Car (in Driving Mode):</b><br> 
                Use Arrow Keys to drive.
            </p>
            <button id="resetBtn">Reset Car</button>
            <hr>
            
            <div class="debug-controls">
                <input type="checkbox" id="showPolygon" checked>
                <label for="showPolygon">Show Collision Polygons</label>
            </div>
            
            <!-- NEW: Zoom Slider Control -->
            <div class="zoom-controls">
                <label for="zoomSlider">Zoom</label>
                <input type="range" id="zoomSlider" min="0.3" max="1.5" value="0.7" step="0.05">
            </div>
            <hr>

            <p>
                <b>Road Editor (in Editing Mode):</b><br>
                - <b>Left-Click & Drag</b> the yellow handle.<br>
                - <b>Right-Click</b> the yellow handle to add a new segment.
            </p>
        </div>
        <div id="canvas-container">
            <canvas id="simulationCanvas"></canvas>
        </div>
    </div>

    <!-- Script files... -->
    <script src="utils.js"></script>
    <script src="road.js"></script>
    <script src="controls.js"></script>
    <script src="sensor.js"></script>
    <script src="car.js"></script>
    <script src="main.js"></script>
</body>
</html>
